version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    groups:
      astro:
        patterns:
          - astro
          - "@astrojs/*"
      typescript:
        patterns:
          - typescript
    commit-message:
      prefix: deps

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
